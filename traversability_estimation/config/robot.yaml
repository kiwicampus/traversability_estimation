traversability_estimation:
  ros__parameters:
    use_raw_map: true
    submap_service: "/get_raw_submap"
    map_frame_id: "odom"
    robot_frame_id: "base_link"
    min_update_rate: 5.0
    map_center_x: 0.0
    map_center_y: 0.0
    map_length_x: 6.0
    map_length_y: 6.0
    footprint_yaw: 0.0
    max_gap_width: 0.15
    grid_map_to_initialize_traversability_map:
      enable: true
      grid_map_topic_name: /elevation_map_raw